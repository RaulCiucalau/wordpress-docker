services:
  db:
    image: bitnami/mariadb:latest
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-bitnami_wordpress}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db_data:/bitnami/mariadb
    networks:
      - wordpress_net

  wordpress:
    image: bitnami/wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WORDPRESS_PORT:-8080}:8080"
    environment:
      WORDPRESS_DATABASE_HOST: db
      WORDPRESS_DATABASE_PORT_NUMBER: "3306"
      WORDPRESS_DATABASE_NAME: ${MARIADB_DATABASE:-bitnami_wordpress}
      WORDPRESS_DATABASE_USER: ${MARIADB_USER}
      WORDPRESS_DATABASE_PASSWORD: ${MARIADB_PASSWORD}
      WORDPRESS_BLOG_NAME: ${WORDPRESS_BLOG_NAME:-My WordPress Site}
      WORDPRESS_ENABLE_HTTPS: ${WORDPRESS_ENABLE_HTTPS:-no}
    networks:
      - wordpress_net

volumes:
  db_data:

networks:
  wordpress_net:
    driver: bridge